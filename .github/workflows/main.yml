name: Build_Watan_Attendance_System

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5==5.15.9 pyzk==0.5.2 pandas==1.5.3 openpyxl==3.1.2 pyinstaller==6.10.0

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed ^
        --icon="icon.ico" ^
        --add-data "logo.jpg;." ^
        --hidden-import=sqlite3 ^
        --hidden-import=json ^
        --hidden-import=sys ^
        --hidden-import=PyQt5.QtPrintSupport ^
        --hidden-import=PyQt5.QtCore ^
        --hidden-import=PyQt5.QtGui ^
        --hidden-import=PyQt5.QtWidgets ^
        --hidden-import=zk ^
        --hidden-import=zk.base ^
        --hidden-import=pandas ^
        --name "Watan_Attendance_System_Final" ^
        main.py

    - name: Upload Final EXE
      uses: actions/upload-artifact@v4
      with:
        name: Watan_Attendance_Final_EXE
        path: dist/Watan_Attendance_System_Final.exe
        retention-days: 30
