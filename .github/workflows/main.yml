name: Build_Watan_Attendance_System

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller ONLY
      run: |
        pip install pyinstaller

    - name: Test PyInstaller
      run: pyinstaller --version

    - name: Build EXE (Simple)
      run: |
        pyinstaller --onefile --windowed main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: watan-attendance
        path: dist/main.exe
